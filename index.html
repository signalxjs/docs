<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A lightweight reactive component framework" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/x-icon" href="/sigx.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Theme initialization - runs before render to prevent flash -->
    <script>
        (function() {
            var theme = localStorage.getItem('daisy-theme');
            if (!theme && window.matchMedia('(prefers-color-scheme: light)').matches) {
                theme = 'light';
            }
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SignalX" />
    <meta property="og:description" content="A lightweight reactive component framework" />
    <meta property="og:url" content="https://signalx.dev" />
    <meta property="og:image" content="https://signalx.dev/og-image.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@signalxjs" />
    <meta name="twitter:title" content="SignalX" />
    <meta name="twitter:description" content="A lightweight reactive component framework" />
    <meta name="twitter:image" content="https://signalx.dev/og-image.png" />
    <title>SignalX</title>
    <!--head-tags-->
</head>
<body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/@ssg/client.tsx"></script>
</body>
</html>
